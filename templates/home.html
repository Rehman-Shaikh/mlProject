<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Exam Performance Prediction</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(to right, #74ebd5, #ACB6E5);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .card {
      border-radius: 12px;
      margin-top: 40px;
    }
    h1 {
      font-weight: bold;
      color: #333;
    }
    h2 {
      margin-top: 20px;
      text-align: center;
      color: #004085;
    }
    .btn-custom {
      border-radius: 30px;
      font-size: 1.1rem;
      padding: 10px 25px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card shadow p-4">
      <h1 class="text-center mb-4">Student Exam Performance Indicator</h1>
      <form action="{{ url_for('predict_datapoint')}}" method="post">

        <!-- Gender -->
        <div class="mb-3">
          <label class="form-label">Gender</label>
          <select class="form-select" name="gender" required>
            <option selected disabled value="">Select Gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </div>

        <!-- Ethnicity -->
        <div class="mb-3">
          <label class="form-label">Race or Ethnicity</label>
          <select class="form-select" name="ethnicity" required>
            <option selected disabled value="">Select Ethnicity</option>
            <option value="group A">Group A</option>
            <option value="group B">Group B</option>
            <option value="group C">Group C</option>
            <option value="group D">Group D</option>
            <option value="group E">Group E</option>
          </select>
        </div>

        <!-- Parental Education -->
        <div class="mb-3">
          <label class="form-label">Parental Level of Education</label>
          <select class="form-select" name="parental_level_of_education" required>
            <option selected disabled value="">Select Education</option>
            <option value="associate's degree">Associate's Degree</option>
            <option value="bachelor's degree">Bachelor's Degree</option>
            <option value="high school">High School</option>
            <option value="master's degree">Master's Degree</option>
            <option value="some college">Some College</option>
            <option value="some high school">Some High School</option>
          </select>
        </div>

        <!-- Lunch -->
        <div class="mb-3">
          <label class="form-label">Lunch Type</label>
          <select class="form-select" name="lunch" required>
            <option selected disabled value="">Select Lunch</option>
            <option value="free/reduced">Free/Reduced</option>
            <option value="standard">Standard</option>
          </select>
        </div>

        <!-- Test Prep -->
        <div class="mb-3">
          <label class="form-label">Test Preparation Course</label>
          <select class="form-select" name="test_preparation_course" required>
            <option selected disabled value="">Select Course</option>
            <option value="none">None</option>
            <option value="completed">Completed</option>
          </select>
        </div>

        <!-- Scores -->
        <div class="mb-3">
          <label class="form-label">Reading Score (0-100)</label>
          <input type="number" class="form-control" name="reading_score" min="0" max="100" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Writing Score (0-100)</label>
          <input type="number" class="form-control" name="writing_score" min="0" max="100" required>
        </div>

        <!-- Submit -->
        <div class="d-grid">
          <button type="submit" class="btn btn-primary btn-lg btn-custom">Predict Maths Score</button>
        </div>
      </form>

      <!-- Prediction Result -->
      {% if results %}
      <h2 class="mt-4">Predicted Maths Score: <span class="text-success">{{ results }}</span></h2>
      {% endif %}
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
